name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare output directory
        run: mkdir -p dist

      - name: Copy all files
        run: |
          cp index.html 404.html privacy-policy.html terms-of-service.html dist/
          cp style.css main.js dist/
          cp robots.txt sitemap.xml paletas.svg dist/
          cp -r email-templates dist/ 2>/dev/null || true

      - name: Install & Minify
        run: |
          npm init -y
          npm install html-minifier csso terser
          node -e "
            const fs = require('fs');
            const minify = require('html-minifier').minify;
            const csso = require('csso');
            (async()=>{
              // CSS
              fs.writeFileSync('dist/style.css', csso.minify(fs.readFileSync('dist/style.css','utf8')).css);
              // HTML
              fs.readdirSync('dist').filter(f=>f.endsWith('.html')).forEach(f => {
                fs.writeFileSync('dist/'+f, minify(fs.readFileSync('dist/'+f,'utf8'),
                  {collapseWhitespace:true,removeComments:true,minifyCSS:true,minifyJS:true}));
              });
              // JS
              const r = await require('terser').minify(
                fs.readFileSync('dist/main.js','utf8'),{compress:true,mangle:true});
              fs.writeFileSync('dist/main.js', r.code);
            })().catch(e=>{console.error(e);process.exit(1)});
          "

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

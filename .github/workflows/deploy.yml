name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install minification tools
        run: npm install html-minifier csso terser

      - name: Prepare output directory
        run: mkdir -p dist

      - name: Copy all files
        run: |
          cp index.html 404.html privacy-policy.html terms-of-service.html dist/
          cp style.css main.js dist/
          cp robots.txt sitemap.xml paletas.svg dist/
          cp -r email-templates dist/ 2>/dev/null || true

      - name: Minify HTML
        run: for f in dist/*.html; do npx html-minifier --collapse-whitespace --remove-comments --minify-css true --minify-js true "$f" -o "$f"; done

      - name: Minify CSS
        run: npx csso dist/style.css -o dist/style.css

      - name: Minify JS
        run: npx terser dist/main.js -o dist/main.js -m -c

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
